name = "cpa-monitor"
compatibility_date = "2026-05-03"
pages_build_output_dir = "public"

[vars]
CPA_INSTANCE_ID = "main"
CPA_INSTANCE_NAME = "Main CPA"
CPA_BASE_URL = "https://api.omiku.de"
MONITOR_TARGET_URL = "https://chatgpt.com/backend-api/wham/usage"
CHECK_TIMEOUT_MS = "30000"
CHECK_CONCURRENCY = "8"
SKIP_DISABLED = "true"

# Keep real secrets in Cloudflare Pages dashboard:
# CPA_ACCESS_KEY
# ADMIN_PASSWORD
#
# For multiple CPA instances, use CPA_INSTANCES_JSON as a Cloudflare secret instead
# of the single-instance CPA_* values above.
